<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Membership</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h2{
text-align:center;
color:#2563eb;
margin-bottom:8px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
font-size:14px;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
font-weight:bold;
color:#333;
}

input,select{
width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
}

input:focus,select:focus{
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>
<body>

<div class="container">

<h2>Learning Membership</h2>
<p>Please fill in your details.</p>

<form action="https://formsubmit.co/againnewattempt@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Learning Membership Form">
<input type="hidden" name="_template" value="table">

<label>Full Name</label>
<input type="text" name="Name" placeholder="Enter your full name" required>

<label>Contact Number</label>
<input type="tel" name="Contact Number" placeholder="03XXXXXXXXX" required>

<label>City</label>
<input type="text" name="City" placeholder="Enter your city" required>

<label>Education</label>
<select name="Education" required>
<option value="">Select Education</option>
<option>None (No Education)</option>
<option>Primary</option>
<option>Middle</option>
<option>Matric</option>
<option>Intermediate</option>
<option>DAE</option>
<option>Bachelor</option>
<option>Master</option>
<option>Other</option>
</select>

<button type="submit">Apply Now</button>

</form>

</div>

</body>
    </html>
