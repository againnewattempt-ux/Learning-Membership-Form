<script>

// ===============================
// یہاں اپنا Google Apps Script Web App URL لگائیں
// مثال:
// https://script.google.com/macros/s/XXXXXXXXXXXX/exec
// ===============================

const scriptURL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";


// Form Submit

document.getElementById("membershipForm").addEventListener("submit",function(e){

e.preventDefault();

if(scriptURL === "https://script.google.com/macros/s/AKfycbw0Q_9YP-5JHQ7465HaJp5R5Z8Oz0i99FSBCjvRXBffMIXoj8v7kEdmWH1K_aPzHGVM/exec"){
    document.getElementById("msg").innerHTML =
    "⚠️ Please add Google Script URL first!";
    return;
}


fetch(scriptURL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

name:document.getElementById("name").value,

contact:document.getElementById("contact").value,

city:document.getElementById("city").value,

education:document.getElementById("education").value

})

})

.then(()=>{

document.getElementById("msg").innerHTML =
"✅ Application Submitted Successfully!";

document.getElementById("membershipForm").reset();

})

.catch(()=>{

document.getElementById("msg").innerHTML =
"❌ Submission Failed!";

});

});

</script>
